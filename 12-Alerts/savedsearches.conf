# Splunk Saved Searches - Frothly BOTSv3 Detection Content
# Index: botsv3
# Author: Insiyah Bhatia
# Date: 2026-07-02
#
# Deploy: place in $SPLUNK_HOME/etc/apps/<app>/local/savedsearches.conf
# then restart Splunk or run: /opt/splunk/bin/splunk reload search


# [1]. Multi-Region EC2 RunInstances Sweep
# ---------------------------------------------------------------------------
# Description: Detects a single AWS access key attempting to launch EC2
#              instances across 5+ regions within a 10-minute window.
#              Consistent with resource hijacking / cryptomining
#              infrastructure provisioning (IR-2018-001, IR-2026-0701-001).
# MITRE:       T1496 (Resource Hijacking), T1526 (Cloud Service Discovery)
# ===========================================================================
[EC2 Multi-Region RunInstances Sweep]
disabled = 0
description = Detects a single AWS access key attempting to launch EC2 instances across 5+ regions within a 10-minute window - consistent with resource hijacking / cryptomining infrastructure provisioning (IR-2018-001, IR-2026-0701-001).
search = index="botsv3" sourcetype="aws:cloudtrail" eventSource="ec2.amazonaws.com" eventName="RunInstances" \
    | bin _time span=10m \
    | stats dc(awsRegion) as distinct_regions, count as total_attempts, values(awsRegion) as regions_targeted, values(errorCode) as error_codes, values(sourceIPAddress) as source_ips by userIdentity.accessKeyId, _time \
    | where distinct_regions >= 5 \
    | eval severity = "CRITICAL" \
    | eval mitre_technique = "T1496 - Resource Hijacking | T1526 - Cloud Service Discovery" \
    | table _time userIdentity.accessKeyId distinct_regions total_attempts regions_targeted error_codes source_ips severity mitre_technique
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = userIdentity.accessKeyId
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [CRITICAL] Multi-Region EC2 RunInstances Sweep Detected
action.email.message.alert = A single AWS access key attempted RunInstances across 5+ regions in a 10-minute window. Review CloudTrail immediately for accessKeyId, regions, and source IPs.


# [2]. IAM Reconnaissance Burst
# ---------------------------------------------------------------------------
# Description: Detects a single access key making 4+ distinct sensitive IAM
#              calls within 60 seconds. Consistent with scripted post-compromise
#              enumeration (IR-2018-001, IR-2026-0701-001).
# MITRE:       T1580 (Cloud Infrastructure Discovery), T1087.003 (Account
#              Discovery), T1136.003 (Create Account), T1098.001 (Additional
#              Credentials), T1070 (Indicator Removal)
# ===========================================================================
[IAM Reconnaissance Burst]
disabled = 0
description = Detects a single access key making 4+ distinct sensitive IAM calls within 60 seconds - consistent with scripted post-compromise enumeration (IR-2018-001, IR-2026-0701-001).
search = index="botsv3" sourcetype="aws:cloudtrail" eventSource="iam.amazonaws.com" eventName IN ("GetCallerIdentity","ListAccessKeys","CreateAccessKey","DeleteAccessKey","CreateUser","GetSessionToken") \
    | bin _time span=60s \
    | stats dc(eventName) as distinct_sensitive_calls, values(eventName) as actions_called, values(errorCode) as outcomes, values(sourceIPAddress) as src_ips by userIdentity.accessKeyId, _time \
    | where distinct_sensitive_calls >= 4 \
    | eval severity = "HIGH" \
    | eval mitre_technique = "T1580 - Cloud Infrastructure Discovery | T1087.003 - Account Discovery | T1136.003 - Create Account | T1098.001 - Additional Credentials | T1070 - Indicator Removal" \
    | table _time userIdentity.accessKeyId distinct_sensitive_calls actions_called outcomes src_ips severity mitre_technique
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = userIdentity.accessKeyId
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [HIGH] IAM Reconnaissance Burst Detected
action.email.message.alert = A single access key made 4+ sensitive IAM calls within 60 seconds. Review for signs of post-compromise enumeration.


# [3]. S3 Public ACL Change
# ---------------------------------------------------------------------------
# Description: Alerts on any PutBucketAcl event, whether accidental or
#              malicious, so a second person can review the change before it
#              becomes an exposure window (IR-2018-002).
# MITRE:       T1530 (Data from Cloud Storage)
# ===========================================================================
[S3 Public ACL Change]
disabled = 0
description = Alerts on any PutBucketAcl event, whether accidental or malicious, so a second person can review the change before it becomes an exposure window (IR-2018-002).
search = index="botsv3" sourcetype="aws:cloudtrail" eventName="PutBucketAcl" \
    | eval severity = "HIGH" \
    | eval mitre_technique = "T1530 - Data from Cloud Storage" \
    | table _time userIdentity.userName requestParameters.bucketName sourceIPAddress severity mitre_technique \
    | sort _time
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [HIGH] S3 Bucket ACL Changed - Review Required
action.email.message.alert = An S3 PutBucketAcl call was made. Confirm this was an intended, reviewed change and that the bucket is not publicly writable.


# [4]. IMDS Credential Access - Anomalous First-Seen
# ---------------------------------------------------------------------------
# Description: Detects a host querying the EC2 IMDS security-credentials
#              endpoint for the first time in the current hour. Tuned to avoid
#              alert fatigue from routine SDK credential-refresh traffic, which
#              recurs every ~15 minutes on every instance and is not itself
#              malicious (IR-2018-001).
# MITRE:       T1552.005 (Cloud Instance Metadata API)
# ===========================================================================
[IMDS Credential Access Anomaly]
disabled = 0
description = Detects a host querying the EC2 IMDS security-credentials endpoint for the first time in the current hour. Tuned to avoid alert fatigue from routine SDK credential-refresh traffic, which recurs every ~15 minutes on every instance and is not itself malicious (IR-2018-001).
search = index="botsv3" sourcetype="stream:http" dest_ip="169.254.169.254" uri_path="*iam/security-credentials*" http_method="GET" \
    | bin _time span=1h \
    | stats earliest(_time) as first_seen, count as query_count by host, _time \
    | eval first_seen = strftime(first_seen, "%Y-%m-%d %H:%M:%S") \
    | eval severity = "CRITICAL" \
    | eval mitre_technique = "T1552.005 - Cloud Instance Metadata API" \
    | table first_seen host query_count severity mitre_technique \
    | sort first_seen
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [CRITICAL] New Host Querying IMDS Security Credentials
action.email.message.alert = A host queried the IMDS security-credentials endpoint for the first time this hour. Correlate with recent payload delivery, unusual process activity, or non-standard-port network connections before escalating.


# [5]. Cryptominer Domain Resolution
# ---------------------------------------------------------------------------
# Description: Alerts on DNS queries to known cryptomining pool domains,
#              including Coinhive and its mining pool subdomains. Indicates
#              likely browser-based cryptomining on an endpoint (IR-2018-002).
# MITRE:       T1496 (Resource Hijacking)
# ===========================================================================
[Cryptominer DNS Resolution]
disabled = 0
description = Alerts on DNS queries to known cryptomining pool domains, including Coinhive and its mining pool subdomains. Indicates likely browser-based cryptomining on an endpoint (IR-2018-002).
search = index="botsv3" sourcetype="stream:dns" (query="*coinhive*" OR query="*monero*" OR query="*cryptoloot*" OR query="*minr*" OR query="*webmine*") \
    | eval severity = "HIGH" \
    | eval mitre_technique = "T1496 - Resource Hijacking" \
    | table _time host query query_type answer severity mitre_technique \
    | sort _time
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = host
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [HIGH] Cryptomining Domain Resolution Detected
action.email.message.alert = A host resolved a known cryptomining pool domain. Isolate the endpoint and check browser process activity and AV logs for confirmation.


# [6]. Non-Standard Port C2 Beaconing
# ---------------------------------------------------------------------------
# Description: Detects outbound TCP traffic on port 9998, the specific C2 port
#              IOC from IR-2018-001. Adapt the dest_port value or expand to a
#              lookup list for broader non-standard-port coverage.
# MITRE:       T1571 (Non-Standard Port)
# ===========================================================================
[Non-Standard Port C2 Beacon - Port 9998]
disabled = 0
description = Detects outbound TCP traffic on port 9998, the specific C2 port IOC from IR-2018-001. Adapt the dest_port value or expand to a lookup list for broader non-standard-port coverage.
search = index="botsv3" sourcetype="stream:tcp" dest_port=9998 \
    | eval severity = "HIGH" \
    | eval mitre_technique = "T1571 - Non-Standard Port" \
    | table _time host src_ip dest_ip dest_port bytes_in bytes_out severity mitre_technique \
    | sort _time
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = host,dest_ip
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = security@frothly.com
action.email.subject = [HIGH] Non-Standard Port C2 Traffic Detected
action.email.message.alert = Outbound TCP traffic detected on port 9998, a known C2 IOC. Confirm whether this host is communicating with 34.215.24.225 and isolate if malicious.